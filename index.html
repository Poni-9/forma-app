<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORMA — moje aplikacije</title>
<meta name="theme-color" content="#0a0e13">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Inter',system-ui,sans-serif;color:#e8eef4;min-height:100vh;
    background:radial-gradient(1000px 500px at 85% -10%, rgba(63,206,107,.10), transparent 60%),
      radial-gradient(800px 400px at -10% 110%, rgba(77,163,255,.06), transparent 60%), #0a0e13;
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:26px;gap:16px
  }
  h1{font-size:22px;font-weight:900;margin-bottom:6px;text-align:center}
  p{color:#8b9bab;font-size:13.5px;margin-bottom:18px;text-align:center;max-width:360px}
  a.card{
    display:flex;align-items:center;gap:16px;width:100%;max-width:360px;
    background:linear-gradient(180deg,#141b24,rgba(20,27,36,.7));border:1px solid #22303f;
    border-radius:16px;padding:20px;text-decoration:none;color:#e8eef4;transition:.15s
  }
  a.card:active{transform:scale(.98)}
  a.card .ic{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
  a.card .t{font-weight:800;font-size:16px}
  a.card .s{font-size:12.5px;color:#8b9bab;margin-top:2px}
  .forma .ic{background:linear-gradient(135deg,#fc4c02,#ff8a3d)}
  .kcal .ic{background:linear-gradient(135deg,#3fce6b,#2aa855)}
</style>
</head>
<body>
  <h1>💪 FORMA</h1>
  <p>Izberi aplikacijo. Vsako lahko dodaš na začetni zaslon telefona (⋮ ali Deli → "Dodaj na začetni zaslon").</p>
  <a class="card forma" href="forma-trener.html">
    <div class="ic">💪</div>
    <div><div class="t">FORMA Trener</div><div class="s">Kolo, pohod, moč — plan in koledar</div></div>
  </a>
  <a class="card kcal" href="kalorije.html">
    <div class="ic">🍽️</div>
    <div><div class="t">KalorijeAI</div><div class="s">Slikaj hrano → AI prešteje kalorije</div></div>
  </a>
</body>
</html>
